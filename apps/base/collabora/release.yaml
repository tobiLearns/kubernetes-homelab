apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: collabora-online
  namespace: collabora
spec:
  interval: 30m
  chart:
    spec:
      chart: collabora-online
      version: "1.1.x"

      sourceRef:
        kind: HelmRepository
        name: collabora-online
        namespace: collabora
      interval: 24h
  values:
    # One replica is enough for my current use case:
    replicaCount: 1
    # According to the documentation, the Horizontal Pod Autoscaling should be disabled for now,
    # since it breaks some other features:
    autoscaling:
      enabled: false
    collabora:
      #server_name: "collabora.homelab.net"
      # Security whitelist: Only listed hosts may send WOPI requests to Collabora:
      aliasgroups:
        - host: "https://nextcloud.homelab.net"
      # Traefik terminates TLS. Disable Collabora's own TLS, but keep ssl.termination=true
      # so Collabora generates https/wss links for the browser instead of http/ws:
      extra_params: --o:ssl.enable=false --o:ssl.termination=true --o:server_name=collabora.homelab.net

      existingSecret:
        enabled: true
        secretName: "secret-superuser"
        usernameKey: "username"
        passwordKey: "password"
    # Configure Ingress and TLS:
    ingress:
      enabled: true
      className: "traefik"
      hosts:
        - host: collabora.homelab.net
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: collabora-tls-secret
          hosts:
            - collabora.homelab.net
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "2Gi"
        cpu: "2"


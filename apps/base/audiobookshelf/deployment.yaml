apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      securityContext:
        fsGroup: 1000 #
        runAsUser: 1000 #
        runAsGroup: 1000 #
      containers:
        - name: audiobookshelf
          image: ghcr.io/advplyr/audiobookshelf:latest
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
          - mountPath: /audiobooks
            name: audiobookshelf-audiobooks
          - mountPath: /podcasts
            name: audiobookshelf-podcasts
          - mountPath: /config
            name: audiobookshelf-config
          - mountPath: /metadata
            name: audiobookshelf-metadata
              #          envFrom:
              #          - secretRef:
              #              name: secret-superuser
      volumes:
      - name: audiobookshelf-audiobooks
        persistentVolumeClaim:
          claimName: audiobookshelf-audiobooks-pvc
      - name: audiobookshelf-podcasts
        persistentVolumeClaim:
          claimName: audiobookshelf-podcasts-pvc
      - name: audiobookshelf-config
        persistentVolumeClaim:
          claimName: audiobookshelf-config-pvc
      - name: audiobookshelf-metadata
        persistentVolumeClaim:
          claimName: audiobookshelf-metadata-pvc


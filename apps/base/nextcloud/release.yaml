apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 30m
  chart:
    spec:
      chart: nextcloud
      version: "9.1.x"

      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
      interval: 24h
  values:
    nextcloud:
      host: nextcloud.homelab.net
      trustedDomains:
        - nextcloud.homelab.net
      existingSecret:
        enabled: true
        secretName: "secret-superuser"
        usernameKey: username
        passwordKey: password
    ingress:
      enabled: true
      className: "traefik"
      path: /
      pathType: Prefix
      hosts:
        - host: nextcloud.homelab.net
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: secret-tls
          hosts:
            - nextcloud.homelab.net
    # Traefik terminates TLS and forwards plain HTTP to Nextcloud.
    # This tells Nextcloud's PHP layer to generate https:// links anyway,
    # preventing broken redirects and mixed-content errors in the browser.
    phpClientHttpsFix:
      enabled: true
      protocol: https
    # Use internal database SQLite (default):
    internalDatabase:
      enabled: true
    persistence:
      enabled: true
      storageClass: "local-path"
      accessMode: ReadWriteOnce
      size: 1Gi



apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homarr-dashboard
  namespace: homarr
spec:
  interval: 30m
  chart:
    spec:
      chart: homarr
      version: "8.19.x"

      sourceRef:
        kind: HelmRepository
        name: homarr-dashboard
        namespace: homarr
      interval: 24h
  values:
    ingress:
      enabled: true
      ingressClassName: "traefik"
      hosts:
        - host: homarr.homelab.net
          paths:                     # <-- THIS BLOCK IS REQUIRED
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: homarr-tls-secret
          hosts:
            - homarr.homelab.net
    persistence:
      homarrDatabase:
        enabled: true
        name: "homarr-database"
        storageClassName: "local-path"
        accessMode: "ReadWriteOnce"
        size: "50Mi"
        mountPath: "/appdata"
        volumeClaimName: ""

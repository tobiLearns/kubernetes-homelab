apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homarr-dashboard
  namespace: homarr
spec:
  interval: 30m
  chart:
    spec:
      chart: homarr
      version: "8.19.x"

      sourceRef:
        kind: HelmRepository
        name: homarr-dashboard
        namespace: homarr
      interval: 24h


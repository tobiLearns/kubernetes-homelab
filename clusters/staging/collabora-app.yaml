apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: collabora-app
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/staging/collabora
  prune: true
  targetNamespace: collabora
  decryption:
    provider: sops
    secretRef:
      name: sops-age
